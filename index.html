<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Menu HQ</title>
    <script type="module" crossorigin src="assets/index.b957513f.js"></script>
    <link rel="stylesheet" href="assets/index.b284bac3.css">
    <style>
        body, html, #root {
            background-color: transparent !important;
            width: 100vw; height: 100vh; overflow: hidden;
        }
        /* Sol menü kapsayıcısını ve listeleri zorla görünür yap */
        .FCWrapper, .MenuContainer, .CategoryList {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        window.invokeNative = false;

        // Menünün sol tarafını tetiklemek için gereken sahte veri paketi
        const forceMenuData = () => {
            window.postMessage({
                action: 'displayFreecam',
                visible: true,
                // Menünün sol tarafını çizmesi için bu isimleri bekliyor olabilir
                menuName: "ORION", 
                category: "MAIN",
                weaponIndex: 1,
                vehicleIndex: 1,
                // Eğer liste hala boşsa, içeriği buraya zorla basıyoruz
                items: ["Self", "Weapon", "Visual", "Misc"] 
            }, '*');
        };

        // Sayfa açıldığında ve her saniye bu veriyi tazele
        setInterval(forceMenuData, 200);
    </script>
</body>
</html>
