<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Menu</title>
    <script type="module" crossorigin src="assets/index.b957513f.js"></script>
    <link rel="stylesheet" href="assets/index.b284bac3.css">
    <style>
        /* Menüyü CSS ile her koşulda görünür olmaya zorluyoruz */
        body, html, #root {
            background-color: transparent !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .FCWrapper {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // FiveM NUI kilidini kır
        window.invokeNative = false;

        // Sayfa her yüklendiğinde JS'e "açıldım" mesajını kendi içinden gönder
        const forceOpen = () => {
            window.postMessage({
                action: 'displayFreecam',
                visible: true
            }, '*');
        };

        // Hem hemen hem de 1 saniye sonra tekrar dene
        forceOpen();
        setTimeout(forceOpen, 1000);
    </script>
</body>
</html>
