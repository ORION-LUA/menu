<!DOCTYPE html>
<html lang="en">
<head>

    <title>Menu Test</title>
    <script type="module" crossorigin src="assets/index.b957513f.js"></script>
    <link rel="stylesheet" href="assets/index.b284bac3.css">
    
    <style>
        body, html, #root {
            background-color: transparent !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Menünün "FiveM'de değilim" sanıp kendini kapatmasını engeller
        window.invokeNative = false;
        
        // Menüye "Açıl" mesajını JS içinden zorla gönderiyoruz
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.postMessage({action: 'displayFreecam', visible: true}, '*');
            }, 1000);
        });
    </script>
