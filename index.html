<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Menu HQ</title>
    <script type="module" crossorigin src="assets/index.b957513f.js"></script>
    <link rel="stylesheet" href="assets/index.b284bac3.css">
    <style>
        /* CSS İLE ZORLA GÖRÜNÜR YAPMA */
        body, html, #root {
            background-color: transparent !important;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: block !important;
        }

        /* Menü kapsayıcısını ekranın soluna zorla sabitle */
        .FCWrapper {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: absolute !important;
            left: 5% !important;
            top: 15% !important;
            z-index: 9999 !important;
        }

        /* Eğer menü hala görünmüyorsa alt bileşenleri de zorlayalım */
        div[class*="Menu"], div[class*="Container"], .Option {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        window.invokeNative = false;

        // Menüye gönderilecek veri paketi
        const menuData = {
            action: 'displayFreecam',
            visible: true,
            menuName: "ORION",
            category: "MAIN",
            items: ["Self", "Weapon", "Visual", "Misc"]
        };

        // JS yüklendiğinde ve sonrasında sürekli veri bas
        function initMenu() {
            window.postMessage(menuData, '*');
            // React'in event listener'ı bazen geç yüklendiği için tekrar gönderiyoruz
            setTimeout(() => window.postMessage(menuData, '*'), 500);
            setTimeout(() => window.postMessage(menuData, '*'), 1500);
        }

        window.onload = initMenu;
        // Menünün kapanma (hide) tetikleyicilerini iptal etmek için her saniye açık tut
        setInterval(() => window.postMessage(menuData, '*'), 1000);
    </script>
</body>
</html>
