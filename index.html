<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Menu</title>
    <script type="module" crossorigin src="assets/index.b957513f.js"></script>
    <link rel="stylesheet" href="assets/index.b284bac3.css">
    <style>
        /* KALİTE VE GÖRÜNÜRLÜK AYARLARI */
        body, html, #root {
            background-color: transparent !important;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        /* Menü listesinin (sol taraf) görünmesini zorla */
        .FCWrapper {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: absolute !important;
            left: 10% !important; /* Sol tarafa yasla */
            bottom: 20% !important;
        }

        /* Seçeneklerin görünürlüğünü zorla */
        .Option {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            font-size: 1.2rem !important; /* Yazı kalitesini artır */
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        window.invokeNative = false;

        // JS'e sürekli "açık kal" sinyali gönder (Menü elemanlarını tetikler)
        setInterval(() => {
            window.postMessage({
                action: 'displayFreecam',
                visible: true,
                weaponIndex: 1,
                vehicleIndex: 1
            }, '*');
        }, 100);
    </script>
</body>
</html>
